<!DOCTYPE html>
<html>
<head>
  <title>Generate Thumbnail</title>
</head>
<body>
  <h1>Right-click and "Save image as..." thumbnail.png</h1>
  <canvas id="canvas" width="300" height="300"></canvas>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, 300, 300);
    grad.addColorStop(0, '#0f1419');
    grad.addColorStop(1, '#1a1f26');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 300, 300);
    
    // Accent glow
    const glow = ctx.createRadialGradient(100, 80, 0, 100, 80, 200);
    glow.addColorStop(0, 'rgba(59, 130, 246, 0.3)');
    glow.addColorStop(1, 'rgba(59, 130, 246, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, 300, 300);
    
    // Purple glow
    const glow2 = ctx.createRadialGradient(220, 240, 0, 220, 240, 150);
    glow2.addColorStop(0, 'rgba(168, 85, 247, 0.2)');
    glow2.addColorStop(1, 'rgba(168, 85, 247, 0)');
    ctx.fillStyle = glow2;
    ctx.fillRect(0, 0, 300, 300);
    
    // Diamond icon
    ctx.save();
    ctx.translate(150, 120);
    ctx.beginPath();
    ctx.moveTo(0, -50);
    ctx.lineTo(50, 0);
    ctx.lineTo(0, 50);
    ctx.lineTo(-50, 0);
    ctx.closePath();
    
    const diamondGrad = ctx.createLinearGradient(-50, -50, 50, 50);
    diamondGrad.addColorStop(0, '#3b82f6');
    diamondGrad.addColorStop(1, '#a855f7');
    ctx.fillStyle = diamondGrad;
    ctx.fill();
    
    // Inner diamond cutout
    ctx.beginPath();
    ctx.moveTo(0, -25);
    ctx.lineTo(25, 0);
    ctx.lineTo(0, 25);
    ctx.lineTo(-25, 0);
    ctx.closePath();
    ctx.fillStyle = '#0f1419';
    ctx.fill();
    ctx.restore();
    
    // GitHub icon (simplified)
    ctx.save();
    ctx.translate(150, 200);
    ctx.beginPath();
    ctx.arc(0, 0, 25, 0, Math.PI * 2);
    ctx.fillStyle = '#e7edf4';
    ctx.fill();
    
    // GitHub cat silhouette approximation
    ctx.beginPath();
    ctx.arc(0, -2, 15, 0, Math.PI * 2);
    ctx.fillStyle = '#0f1419';
    ctx.fill();
    ctx.restore();
    
    // Text
    ctx.fillStyle = '#e7edf4';
    ctx.font = 'bold 18px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('App Studio', 150, 260);
    ctx.fillText('GitHub Sync', 150, 282);
  </script>
</body>
</html>
